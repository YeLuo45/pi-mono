name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: GITHUB_PAGES=1 npx vite build

      - name: Prepare SPA fallback files
        run: |
          # Create 404.html that redirects to index.html with path preservation
          cat > dist/renderer/404.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PixelPal</title>
    <script>
      var base = '/pixel-pal-web/';
      var path = window.location.pathname;
      if (path.startsWith(base)) {
        path = path.slice(base.length);
      }
      window.location.href = base + (path || '');
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/renderer

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
